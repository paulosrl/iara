name: рЯІЬвАНвЩАпЄП IARA Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: рЯР≥ Build Docker Image
      run: |
        docker build . --file Dockerfile --tag iara-app:latest
        
    - name: вЬЕ Verify Health
      run: |
        docker run -d --name iara-test iama-app:latest
        sleep 5
        docker ps | grep iara-test
        docker stop iara-test
